document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ign-items:center;gap:14px;width:100%;justify-content:center;\">\n                <div style=\"flex:1;max-width:160px;height:1px;background:linear-gradient(to right,transparent,#C8963E);\"><\u002Fdiv>\n                <div style=\"width:7px;height:7px;background:#C8963E;transform:rotate(45deg);\"><\u002Fdiv>\n                <div style=\"flex:1;max-width:160px;height:1px;background:linear-gradient(to left,transparent,#C8963E);\"><\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"font-family:Georgia,serif;font-size:12px;color:#C8963E;letter-spacing:4px;text-transform:uppercase;margin:0;opacity:0.85;\">Guía de Nutrición<\u002Fp>\n              <h1 style=\"font-family:Georgia,'Playfair Display',serif;font-size:78px;font-weight:bold;color:#F0EAE0;margin:0;line-height:1;text-align:center;letter-spacing:-1.5px;\">Come para<br>Transformar<\u002Fh1>\n              <div style=\"width:320px;height:3px;background:linear-gradient(to right,transparent,#C8963E 30%,#C8963E 70%,transparent);\"><\u002Fdiv>\n              <p style=\"font-family:Georgia,serif;font-size:19px;color:#C8963E;font-style:italic;margin:0;text-align:center;line-height:1.6;max-width:500px;\">La guía de nutrición para el hombre<br>que entrena 3 veces por semana<\u002Fp>\n              <div style=\"display:flex;width:100%;max-width:580px;border-top:1px solid rgba(200,150,62,0.35);border-bottom:1px solid rgba(200,150,62,0.35);margin-top:4px;\">\n                <div style=\"flex:1;text-align:center;padding:16px 10px;\">\n                  <p style=\"font-family:Georgia,serif;font-size:11px;color:#F0EAE0;opacity:0.5;margin:0;letter-spacing:1px;text-transform:uppercase;line-height:1.7;\">Sin contar<br>calorías<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"width:1px;background:rgba(200,150,62,0.3);margin:10px 0;\"><\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:16px 10px;\">\n                  <p style=\"font-family:Georgia,serif;font-size:11px;color:#F0EAE0;opacity:0.5;margin:0;letter-spacing:1px;text-transform:uppercase;line-height:1.7;\">Sin dietas<br>restrictivas<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"width:1px;background:rgba(200,150,62,0.3);margin:10px 0;\"><\u002Fdiv>\n                <div style=\"flex:1;text-align:center;padding:16px 10px;\">\n                  <p style=\"font-family:Georgia,serif;font-size:11px;color:#F0EAE0;opacity:0.5;margin:0;letter-spacing:1px;text-transform:uppercase;line-height:1.7;\">Sin complicarte<br>la vida<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;width:100%;max-width:580px;margin-top:2px;\">\n                <div style=\"flex:1;background:rgba(200,150,62,0.08);border:1px solid rgba(200,150,62,0.2);padding:14px 12px;text-align:center;\">\n                  <p style=\"font-family:Georgia,serif;font-size:10px;color:#C8963E;letter-spacing:2px;text-transform:uppercase;margin:0 0 5px;\">Bloque 1<\u002Fp>\n                  <p style=\"font-family:Georgia,serif;font-size:12px;color:#F0EAE0;opacity:0.7;margin:0;line-height:1.4;\">Entender<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"flex:1;background:rgba(200,150,62,0.08);border:1px solid rgba(200,150,62,0.2);padding:14px 12px;text-align:center;\">\n                  <p style=\"font-family:Georgia,serif;font-size:10px;color:#C8963E;letter-spacing:2px;text-transform:uppercase;margin:0 0 5px;\">Bloque 2<\u002Fp>\n                  <p style=\"font-family:Georgia,serif;font-size:12px;color:#F0EAE0;opacity:0.7;margin:0;line-height:1.4;\">Aplicar<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"flex:1;background:rgba(200,150,62,0.08);border:1px solid rgba(200,150,62,0.2);padding:14px 12px;text-align:center;\">\n                  <p style=\"font-family:Georgia,serif;font-size:10px;color:#C8963E;letter-spacing:2px;text-transform:uppercase;margin:0 0 5px;\">Bloque 3<\u002Fp>\n                  <p style=\"font-family:Georgia,serif;font-size:12px;color:#F0EAE0;opacity:0.7;margin:0;line-height:1.4;\">Sostener<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px;width:100%;justify-content:center;\">\n                <div style=\"flex:1;max-width:160px;height:1px;background:linear-gradient(to right,transparent,#C8963E);\"><\u002Fdiv>\n                <div style=\"width:7px;height:7px;background:#C8963E;transform:rotate(45deg);\"><\u002Fdiv>\n                <div style=\"flex:1;max-width:160px;height:1px;background:linear-gradient(to left,transparent,#C8963E);\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"text-align:center;width:100%;position:relative;z-index:1;display:flex;flex-direction:column;gap:4px;\">\n              <p style=\"font-family:Georgia,serif;font-size:14px;color:#F0EAE0;margin:0;letter-spacing:2.5px;text-transform:uppercase;\">Juanchi Busilachi<\u002Fp>\n              <p style=\"font-family:Georgia,serif;font-size:11px;color:#C8963E;margin:0;letter-spacing:1.5px;opacity:0.75;font-style:italic;\">Entrenador Personal · Reinicio 8 Semanas<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"width:520px;height:736px;overflow:hidden;flex-shrink:0;\">\n          <div style=\"width:794px;height:1123px;transform:scale(0.6549);transform-origin:top left;overflow:hidden;background:#F5EFE6;padding:30px 50px 90px;position:relative;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #C8963E;padding-bottom:8px;margin-bottom:28px;\">\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#1A0F08;font-style:italic;\">Introducción · El entrenamiento sin la nutrición es la mitad del trabajo<\u002Fspan>\n            <\u002Fdiv>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;margin:0 0 12px;\">Por qué este eBook existe<\u002Fh2>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 14px;\">Si estás leyendo esto, probablemente ya estás entrenando. Tres veces por semana, con un plan que tiene sentido, progresando en las cargas. Hacés lo que corresponde en el gimnasio.<\u002Fp>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 14px;\">Y aun así, los resultados no terminan de aparecer, o aparecen más lento de lo que deberían, o llegan y desaparecen con el primer asado del domingo.<\u002Fp>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 22px;\">El problema casi nunca es el entrenamiento, el problema es lo que pasa las otras 165 horas de la semana que no estás en el gym.<\u002Fp>\n            <div style=\"border-left:5px solid #C8963E;background:#EAE0D5;padding:20px 25px;margin:0 0 24px;\">\n              <p style=\"font-family:Georgia,serif;font-size:17px;color:#2C1A0E;font-style:italic;margin:0 0 10px;line-height:1.65;\">\"Hay cosas que me costaron más soltar que agregar. No fue solo el plan de entreno perfecto lo que cambió mi físico, también fue dejar de hacer lo que lo frenaba.\"<\u002Fp>\n              <p style=\"font-family:Georgia,serif;font-size:13px;color:#C8963E;font-weight:bold;margin:0;\">- Juanchi Busilachi<\u002Fp>\n            <\u002Fdiv>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;margin:0 0 12px;\">El problema que nadie te está diciendo<\u002Fh2>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 14px;\">El hombre que entrena bien suele comer de una de estas formas: muy poco durante el día y demasiado a la noche, perfecto de lunes a viernes y caótico el fin de semana, o 'limpio' pero sin proteína suficiente para que el músculo responda. Cualquiera de las tres frena los resultados aunque el entrenamiento sea impecable.<\u002Fp>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 22px;\">No es falta de disciplina, es falta de un sistema claro que funcione en la vida real, con trabajo, con familia, con asados los domingos y cerveza los viernes. La mayoría de las guías de nutrición están pensadas para alguien que vive en un mundo sin contexto social, este eBook no.<\u002Fp>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;margin:0 0 12px;\">Qué vas a encontrar acá<\u002Fh2>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 14px;\">Este eBook no te va a dar una dieta, te va a dar el sistema de hábitos que hace que comer bien sea lo que pasa por default, sin pensar demasiado. Igual que el Reinicio te dio un plan de entreno que tiene sentido para tu vida, Come para Transformar te da un plan de alimentación que tampoco te hace odiar la vida.<\u002Fp>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 22px;\">Está organizado en tres bloques. El primero (Entender) te explica por qué hacés lo que hacés con la comida y qué cambiar primero. El segundo (Aplicar) te da la estrategia concreta para los días de entreno, los días de descanso, el asado y el finde con alcohol. El tercero (Sostener) te deja los hábitos que reemplazan cualquier dieta y que podés mantener el resto de tu vida.<\u002Fp>\n            <div style=\"position:absolute;bottom:30px;left:50px;right:50px;border-top:1px solid #C8963E;padding-top:8px;display:flex;justify-content:space-between;\">\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#888888;\">© 2026 Juanchi Busilachi · @juanchibusilachi<\u002Fspan>\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#888888;\">8<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"width:520px;height:736px;overflow:hidden;flex-shrink:0;\">\n          <div style=\"width:794px;height:1123px;transform:scale(0.6549);transform-origin:top left;overflow:hidden;background:#F5EFE6;padding:30px 50px 90px;position:relative;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #C8963E;padding-bottom:8px;margin-bottom:28px;\">\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#1A0F08;font-style:italic;\">Capítulo 02 · La proteína: el único nutriente que no podés ignorar<\u002Fspan>\n            <\u002Fdiv>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;margin:0 0 12px;\">Fuentes de proteína comunes<\u002Fh2>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 22px;position:relative;top:-10px;\">La buena noticia es que en Argentina tienes acceso a algunas de las mejores fuentes de proteína del mundo, empezando por la carne vacuna. La mala noticia es que la mayoría de los hombres no sabe en qué cantidad comerlas para alcanzar los gramos que necesita. Esta tabla lo resuelve:<br><\u002Fp>\n            <sc-raw-table style=\"width:100%;border-collapse:collapse;margin:0 0 14px;font-family:Georgia,serif;position:relative;top:-20px;\">\n              <sc-raw-thead><sc-raw-tr><sc-raw-th style=\"background:#2C1A0E;color:#F0EAE0;font-size:13px;font-weight:bold;padding:10px 14px;text-align:left;\">Fuente de proteína<\u002Fsc-raw-th><sc-raw-th style=\"background:#2C1A0E;color:#F0EAE0;font-size:13px;font-weight:bold;padding:10px 14px;text-align:left;\">Porción práctica<\u002Fsc-raw-th><sc-raw-th style=\"background:#2C1A0E;color:#F0EAE0;font-size:13px;font-weight:bold;padding:10px 14px;text-align:left;\">Proteína aprox.<\u002Fsc-raw-th><\u002Fsc-raw-tr><\u002Fsc-raw-thead>\n              <sc-raw-tbody>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">Pechuga de pollo<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">1 filet mediano (~150g)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">~45-49g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">Carne vacuna magra (peceto, lomo)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">1 bife mediano (~150g)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">~45–47g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">Huevos enteros<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">3–4 huevos<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#F5EFE6;\">~18–24g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">Claras de huevo<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:1 >~17–20g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">Milanesa de carne (al horno)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">1 unidad mediana (~150g)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;border-bottom:1px solid #E0D8CE;background:#EAE0D5;\">~25–28g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n                <sc-raw-tr><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;background:#F5EFE6;\">Proteína en polvo (opcional)<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;background:#F5EFE6;\">1 scoop en agua o leche<\u002Fsc-raw-td><sc-raw-td style=\"font-family:Georgia,serif;font-size:14px;color:#1A0F08;padding:9px 14px;background:#F5EFE6;\">~25–33g<\u002Fsc-raw-td><\u002Fsc-raw-tr>\n              <\u002Fsc-raw-tbody>\n            <\u002Fsc-raw-table>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 14px;position:relative;top:-20px;\">La milanesa, que es un básico de la cocina argentina, también entra en la lista cuando está hecha al horno en lugar de frita. Lo mismo con el asado: los cortes magros como el peceto, el lomo o la colita de cuadril son proteína pura con poca grasa, y el asado del domingo puede ser perfectamente una comida con proteína alta si sabés qué cortes priorizar.<\u002Fp>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;margin:0 0 12px;position:relative;top:-20px;\">La regla del 80% aplicada a la proteína<\u002Fh2>\n            <p style=\"font-family:Georgia,serif;font-size:15px;color:#1A0F08;line-height:1.75;margin:0 0 22px;position:relative;top:-20px;\">No hace falta comer proteína perfecta en cada comida de cada día. El objetivo real es cubrirla en el 80% de las comidas de la semana. Si hacés tres comidas diarias durante siete días eso son 21 comidas, y el 80% son 17 comidas con proteína adecuada. Las otras cuatro no arruinan nada si el resto de la semana estuvo bien.<\u002Fp>\n            <div style=\"background:#EAE0D5;padding:18px 28px;text-align:center;margin:0 0 20px;position:relative;top:-20px;\"><p style=\"font-family:Georgia,serif;font-size:15px;color:#2C1A0E;font-style:italic;margin:0;line-height:1.65;\">Proteína en el 80% de tus comidas + consistencia en el tiempo = el músculo responde.<\u002Fp><\u002Fdiv>\n            <div style=\"position:absolute;bottom:30px;left:50px;right:50px;border-top:1px solid #C8963E;padding-top:8px;display:flex;justify-content:space-between;\"><span style=\"font-family:Georgia,serif;font-size:11px;color:#888888;\">© 2026 Juanchi Busilachi · @juanchibusilachi<\u002Fspan><span style=\"font-family:Georgia,serif;font-size:11px;color:#888888;\">17<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"width:520px;height:736px;overflow:hidden;flex-shrink:0;\">\n          <div style=\"width:794px;height:1123px;transform:scale(0.6549);transform-origin:top left;overflow:hidden;background:#F5EFE6;padding:30px 50px 90px;position:relative;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #C8963E;padding-bottom:8px;margin-bottom:24px;\">\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#1A0F08;font-style:italic;\">Calculadora de Proteína Diaria<\u002Fspan>\n              <span style=\"font-family:Georgia,serif;font-size:11px;color:#C8963E;letter-spacing:2px;font-weight:bold;\">RECURSO 01<\u002Fspan>\n            <\u002Fdiv>\n            <h2 style=\"font-family:Georgia,serif;font-size:22px;font-weight:bold;color:#2C1A0E;
